<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AJEDREZ TOTAL - 2D/3D + IA + REGLAS COMPLETAS</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0f1e;
        }
        /* MODAL INICIO */
        .modal-full {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(16px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: linear-gradient(145deg, #1e1f2c, #13141f);
            border-radius: 60px;
            padding: 30px 28px;
            width: 90%;
            max-width: 520px;
            border: 2px solid rgba(255,215,0,0.5);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: scale(0.96) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-card h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 8px;
        }
        .badge {
            background: #ff6b4a;
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0 15px;
        }
        .btn-mode {
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .btn-mode:active { transform: scale(0.96); }
        .btn-mode.ai { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-mode.pvp { background: linear-gradient(135deg, #f12711, #f5af19); }
        .btn-mode.auto { background: linear-gradient(135deg, #8E2DE2, #4A00E0); }
        .btn-dim { background: linear-gradient(135deg, #2193b0, #6dd5ed); }
        .btn-dim.d2d { background: linear-gradient(135deg, #4b6cb7, #182848); }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px;
        }
        .swatch {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.1s;
            margin: 0 auto;
            box-shadow: 0 4px 10px black;
        }
        .swatch.selected { border-color: gold; transform: scale(1.05); box-shadow: 0 0 18px gold; }
        .preview-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 12px auto;
            border: 3px solid #ffd966;
        }
        .start-btn {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 15px;
        }
        .ui-top-left, .ui-top-right, .ui-bottom {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
        }
        .ui-top-left {
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 50px;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
        .ui-top-right {
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 60px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.2rem;
            border: 1px solid rgba(255,215,0,0.5);
            font-family: monospace;
        }
        .ui-bottom {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 60px;
            display: flex;
            gap: 16px;
            pointer-events: auto;
        }
        button.action {
            background: #e63946;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button.action.purple { background: #9b59b6; }
        button.action.orange { background: #f39c12; }
        .status-text {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 11px;
            color: #ccc;
            pointer-events: none;
            z-index: 1000;
        }
        #canvas2d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #1a1f2a;
            z-index: 5;
        }
        .promo-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,15,30,0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 25px;
            z-index: 20000;
            border: 2px solid gold;
            text-align: center;
            display: none;
            flex-direction: column;
            gap: 18px;
            min-width: 280px;
        }
        .promo-pieces {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .promo-item {
            width: 75px;
            height: 75px;
            background: #2a2a3e;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            transition: 0.1s;
            border: 2px solid #ffaa44;
        }
        .promo-item:active { transform: scale(0.94); }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.7), transparent);
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: rippleAnim 0.5s ease-out forwards;
            z-index: 10000;
        }
        @keyframes rippleAnim {
            0% { width: 0; height: 0; opacity: 0.8; }
            100% { width: 120px; height: 120px; opacity: 0; }
        }
        @media (max-width: 650px) {
            .swatch { width: 48px; height: 48px; }
            .btn-mode { padding: 6px 16px; font-size: 13px; }
            .promo-item { width: 60px; height: 60px; font-size: 40px; }
        }
    </style>
</head>
<body>

<div id="startModal" class="modal-full">
    <div class="modal-card">
        <h1>♞ AJEDREZ TOTAL</h1>
        <div class="badge">✨ REGLAS COMPLETAS | 2D/3D | IA ✨</div>
        <h3 style="color:#ddd;">🎮 MODO</h3>
        <div class="btn-group">
            <button class="btn-mode ai" id="modeVsAI">🤖 VS IA</button>
            <button class="btn-mode pvp" id="mode2P">👥 2 JUGADORES</button>
            <button class="btn-mode auto" id="modeAIAI">⚡ IA vs IA</button>
        </div>

            <button class="btn-mode btn-dim" id="dim3d">🎮 3D REALISTA</button>
            <button class="btn-mode btn-dim d2d" id="dim2d">🖼️ 2D CLÁSICO</button>
        </div>
        <h3 id="colorPrompt" style="color:#ffd966;">🎨 COLOR DE TUS PIEZAS (BLANCAS):</h3>
        <div id="colorGrid" class="color-grid"></div>

        <button class="start-btn" id="startGameBtn">🚀 COMENZAR PARTIDA</button>

</div>

<div id="promotionBox" class="promo-modal">
    <h3 style="color:#ffd966;">🌟 ¡PROMOCIÓN ÉPICA! 🌟</h3>
    <p style="color:white;">Elige nueva pieza para tu peón:</p>
    <div class="promo-pieces" id="promoOptions"></div>
</div>

<div class="ui-top-left">♜ AJEDREZ TOTAL | <span id="modeLabel">MODO</span></div>
<div class="ui-top-right">⚔️ TURNO: <span id="turnText">BLANCAS</span></div>
<div class="ui-bottom">
    <button class="action" id="resetBtn">🔄 REINICIAR</button>
    <button class="action purple" id="colorBtn">🎨 COLORES</button>
    <button class="action orange" id="toggleDimBtn">🔄 CAMBIAR 2D/3D</button>
</div>
<div class="status-text" id="statusMsg">⚡ LISTO</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }

</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ---------- ESTADO GLOBAL ----------
let board = Array(8).fill().map(() => Array(8).fill(null));
let turn = 'white';
let gameMode = 'vsAI';
let playerColor = 'white';
let gameOver = false;
let selectedPiece = null;
let is3D = true;

// 3D
let scene, camera, renderer, labelRenderer, controls3D, piecesGroup;
let piecesMap = new Map();
let highlightMeshes = [];

// 2D
let ctx2d, canvas2d;
let selected2D = null;
let highlight2D = [];

// Colores personalizados
let whiteColorCode = 0xeeeeff;
let blackColorCode = 0x222222;

const colorPalette = [
    { name: 'Blanco Real', val: 0xeeeeff, preview: '#eeeeff' },
    { name: 'Dorado', val: 0xffcc44, preview: '#ffcc44' },
    { name: 'Plateado', val: 0xc0c0c0, preview: '#c0c0c0' },
    { name: 'Rubí', val: 0xff5555, preview: '#ff5555' },
    { name: 'Zafiro', val: 0x5588ff, preview: '#5588ff' },
    { name: 'Esmeralda', val: 0x55ff88, preview: '#55ff88' },
    { name: 'Amatista', val: 0xaa66ff, preview: '#aa66ff' }
];
const darkPalette = [
    { name: 'Obsidiana', val: 0x111111, preview: '#111111' },
    { name: 'Grafito', val: 0x333344, preview: '#333344' },
    { name: 'Caoba', val: 0x4a2511, preview: '#4a2511' },
    { name: 'Ébano', val: 0x2c1810, preview: '#2c1810' },
    { name: 'Violeta', val: 0x331155, preview: '#331155' }
];
let selectedWhiteIdx = 0, selectedBlackIdx = 0;
let pendingMode = 'vsAI';
let pendingDimension = '3d';
let isSelectingBlackFor2P = false;
let autoInterval = null;

// ---------- CLASE PIEZA ----------
class Piece {
    constructor(type, color, row, col) {
        this.type = type;
        this.color = color;
        this.row = row;
        this.col = col;
        this.hasMoved = false;
    }
}

// ---------- INICIALIZAR TABLERO ----------
function initBoard() {
    board = Array(8).fill().map(() => Array(8).fill(null));
    for (let i = 0; i < 8; i++) {
        board[1][i] = new Piece('pawn', 'black', 1, i);
        board[6][i] = new Piece('pawn', 'white', 6, i);
    }
    const backRow = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
    for (let i = 0; i < 8; i++) {
        board[0][i] = new Piece(backRow[i], 'black', 0, i);
        board[7][i] = new Piece(backRow[i], 'white', 7, i);
    }
    turn = 'white';
    gameOver = false;
    selectedPiece = null;
    selected2D = null;
    highlight2D = [];
    updateUI();
    document.getElementById('statusMsg').innerText = '⚔️ EN JUEGO';
    if (gameMode === 'auto') startAutoPlay();
    else if (gameMode === 'vsAI' && playerColor === 'black' && turn === 'white') setTimeout(() => makeAIMove(), 400);
}

// ---------- REGLAS COMPLETAS (con jaque) ----------
function isSquareAttacked(boardState, row, col, attackerColor) {
    for (let i = 0; i < 8; i++) {
        for (let j = 0; j < 8; j++) {
            const p = boardState[i][j];
            if (p && p.color === attackerColor) {
                if (isValidMoveWithoutSelfCheck(p, row, col, boardState, true)) return true;
            }
        }
    }
    return false;
}

function isValidMoveWithoutSelfCheck(piece, toRow, toCol, boardState, ignoreSelfCheck = false) {
    if (!piece) return false;
    const target = boardState[toRow][toCol];
    if (target && target.color === piece.color) return false;
    const fromRow = piece.row, fromCol = piece.col;
    const deltaRow = toRow - fromRow, deltaCol = toCol - fromCol;
    const absRow = Math.abs(deltaRow), absCol = Math.abs(deltaCol);
    
    switch (piece.type) {
        case 'pawn':
            const dir = piece.color === 'white' ? -1 : 1;
            const startRow = piece.color === 'white' ? 6 : 1;
            if (deltaCol === 0 && !target) {
                if (deltaRow === dir) return true;
                if (deltaRow === 2 * dir && fromRow === startRow && !boardState[fromRow+dir][fromCol]) return true;
            } else if (absCol === 1 && deltaRow === dir && target) return true;
            return false;
        case 'knight': return (absRow === 2 && absCol === 1) || (absRow === 1 && absCol === 2);
        case 'bishop':
            if (absRow !== absCol) return false;
            let rStep = deltaRow > 0 ? 1 : -1, cStep = deltaCol > 0 ? 1 : -1;
            let r = fromRow + rStep, c = fromCol + cStep;
            while (r !== toRow || c !== toCol) {
                if (boardState[r][c]) return false;
                r += rStep; c += cStep;
            }
            return true;
        case 'rook':
            if (fromRow !== toRow && fromCol !== toCol) return false;
            if (fromRow === toRow) {
                let step = deltaCol > 0 ? 1 : -1;
                for (let c = fromCol + step; c !== toCol; c += step) if (boardState[toRow][c]) return false;
            } else {
                let step = deltaRow > 0 ? 1 : -1;
                for (let r = fromRow + step; r !== toRow; r += step) if (boardState[r][toCol]) return false;
            }
            return true;
        case 'queen':
            return isValidMoveWithoutSelfCheck(new Piece('rook', piece.color, fromRow, fromCol), toRow, toCol, boardState, true) ||
                   isValidMoveWithoutSelfCheck(new Piece('bishop', piece.color, fromRow, fromCol), toRow, toCol, boardState, true);
        case 'king':
            if (absRow <= 1 && absCol <= 1) return true;
            if (absCol === 2 && deltaRow === 0 && !piece.hasMoved) {
                const rookCol = deltaCol === 2 ? 7 : 0;
                const rook = boardState[fromRow][rookCol];
                if (rook && rook.type === 'rook' && !rook.hasMoved) {
                    const between = deltaCol === 2 ? [5,6] : [1,2,3];
                    for (let c of between) if (boardState[fromRow][c]) return false;
                    return true;
                }
            }
            return false;
        default: return false;
    }
}

function isValidMove(piece, toRow, toCol, boardState) {
    if (!isValidMoveWithoutSelfCheck(piece, toRow, toCol, boardState, false)) return false;
    // Simulación para evitar auto-jaque
    const backup = boardState[toRow][toCol];
    const fromRow = piece.row, fromCol = piece.col;
    boardState[toRow][toCol] = piece;
    boardState[fromRow][fromCol] = null;
    const oldRow = piece.row, oldCol = piece.col;
    piece.row = toRow; piece.col = toCol;
    let kingPos = findKing(piece.color, boardState);
    let inCheck = false;
    if (kingPos) inCheck = isSquareAttacked(boardState, kingPos.row, kingPos.col, piece.color === 'white' ? 'black' : 'white');
    boardState[fromRow][fromCol] = piece;
    boardState[toRow][toCol] = backup;
    piece.row = oldRow; piece.col = oldCol;
    return !inCheck;
}

function findKing(color, boardState) {
    for (let i = 0; i < 8; i++)
        for (let j = 0; j < 8; j++)
            if (boardState[i][j] && boardState[i][j].type === 'king' && boardState[i][j].color === color)
                return { row: i, col: j };
    return null;
}

// ---------- EJECUTAR MOVIMIENTO + PROMOCIÓN ----------
function showPromotionDialog() {
    return new Promise((resolve) => {
        const modal = document.getElementById('promotionBox');
        const container = document.getElementById('promoOptions');
        container.innerHTML = '';
        const types = [
            { type: 'queen', sym: '♕', name: 'REINA' },
            { type: 'rook', sym: '♖', name: 'TORRE' },
            { type: 'bishop', sym: '♗', name: 'ALFIL' },
            { type: 'knight', sym: '♘', name: 'CABALLO' }
        ];
        types.forEach(t => {
            const div = document.createElement('div');
            div.className = 'promo-item';
            div.innerHTML = t.sym;
            div.onclick = () => {
                modal.style.display = 'none';
                resolve(t.type);
            };
            container.appendChild(div);
        });
        modal.style.display = 'flex';
    });
}

async function executeMove(piece, toRow, toCol) {
    if (!isValidMove(piece, toRow, toCol, board)) return false;
    const fromRow = piece.row, fromCol = piece.col;
    const target = board[toRow][toCol];
    board[toRow][toCol] = piece;
    board[fromRow][fromCol] = null;
    piece.row = toRow; piece.col = toCol;
    piece.hasMoved = true;
    
    if (piece.type === 'pawn' && (toRow === 0 || toRow === 7)) {
        const newType = await showPromotionDialog();
        piece.type = newType;
    }
    // Enroque
    if (piece.type === 'king' && Math.abs(toCol - fromCol) === 2) {
        const rookFrom = toCol === 6 ? 7 : 0;
        const rookTo = toCol === 6 ? 5 : 3;
        const rook = board[fromRow][rookFrom];
        if (rook && rook.type === 'rook') {
            board[fromRow][rookTo] = rook;
            board[fromRow][rookFrom] = null;
            rook.row = fromRow;
            rook.col = rookTo;
            rook.hasMoved = true;
            if (is3D) update3DPiece(rook);
        }
    }
    if (is3D) {
        if (target) remove3DPiece(target);
        update3DPiece(piece);
    }
    return true;
}

// ---------- IA ----------
function getAllMoves(color) {
    let moves = [];
    for (let i = 0; i < 8; i++)
        for (let j = 0; j < 8; j++) {
            const p = board[i][j];
            if (p && p.color === color)
                for (let ti = 0; ti < 8; ti++)
                    for (let tj = 0; tj < 8; tj++)
                        if (isValidMove(p, ti, tj, board))
                            moves.push({ piece: p, toRow: ti, toCol: tj });
        }
    return moves;
}

async function makeAIMove() {
    if (gameOver) return false;
    const aiColor = gameMode === 'vsAI' ? (playerColor === 'white' ? 'black' : 'white') : turn;
    if (turn !== aiColor) return false;
    const moves = getAllMoves(aiColor);
    if (moves.length === 0) {
        gameOver = true;
        document.getElementById('statusMsg').innerHTML = `🏆 JAQUE MATE - Ganan ${aiColor === 'white' ? 'NEGRAS' : 'BLANCAS'}`;
        if (autoInterval) clearInterval(autoInterval);
        return false;
    }
    const randomMove = moves[Math.floor(Math.random() * moves.length)];
    if (await executeMove(randomMove.piece, randomMove.toRow, randomMove.toCol)) {
        if (is3D) { clearHighlights3D(); selectedPiece = null; }
        else { selected2D = null; highlight2D = []; draw2DBoard(); }
        switchTurn();
        return true;
    }
    return false;
}

function startAutoPlay() {
    if (autoInterval) clearInterval(autoInterval);
    autoInterval = setInterval(() => { if (!gameOver && turn) makeAIMove(); else if (gameOver) clearInterval(autoInterval); }, 520);
}
function stopAutoPlay() { if (autoInterval) { clearInterval(autoInterval); autoInterval = null; } }

function switchTurn() {
    if (gameOver) return;
    turn = turn === 'white' ? 'black' : 'white';
    updateUI();
    const whiteKing = findKing('white', board);
    const blackKing = findKing('black', board);
    if (!whiteKing) { gameOver = true; document.getElementById('statusMsg').innerHTML = '🏆 NEGRAS GANAN (REY CAPTURADO)'; if (autoInterval) clearInterval(autoInterval); }
    if (!blackKing) { gameOver = true; document.getElementById('statusMsg').innerHTML = '🏆 BLANCAS GANAN (REY CAPTURADO)'; if (autoInterval) clearInterval(autoInterval); }
    if (gameOver) return;
    
    if (gameMode === 'vsAI') {
        const isPlayerTurn = (playerColor === turn);
        if (!isPlayerTurn && !gameOver) setTimeout(() => makeAIMove(), 200);
    } else if (gameMode === 'auto' && !gameOver) {
        if (autoInterval) clearInterval(autoInterval);
        startAutoPlay();
    }
    if (is3D && gameMode !== 'auto') draw3DHighlights();
    if (!is3D) draw2DBoard();
}

// ---------- 3D ----------
function createPieceMesh(piece) {
    const group = new THREE.Group();
    const mainColor = piece.color === 'white' ? whiteColorCode : blackColorCode;
    const goldMat = new THREE.MeshStandardMaterial({ color: 0xffcc44, metalness: 0.95 });
    const bodyMat = new THREE.MeshStandardMaterial({ color: mainColor, metalness: 0.85, roughness: 0.25 });
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.42, 0.12, 32), bodyMat);
    base.position.y = 0.06;
    group.add(base);
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.35, 0.28, 32), bodyMat);
    body.position.y = 0.25;
    group.add(body);
    switch (piece.type) {
        case 'king':
            const top = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.3, 0.35, 32), bodyMat);
            top.position.y = 0.52;
            group.add(top);
            const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.08, 0.08), goldMat);
            const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.3, 0.08), goldMat);
            crossH.position.y = 0.78; crossV.position.y = 0.78;
            group.add(crossH, crossV);
            const ball = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24), goldMat);
            ball.position.y = 0.93;
            group.add(ball);
            break;
        case 'queen':
            const qb = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 0.42, 32), bodyMat);
            qb.position.y = 0.52;
            group.add(qb);
            for (let i=0;i<8;i++) {
                const ang = (i/8)*Math.PI*2;
                const spike = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.2, 6), goldMat);
                spike.position.set(Math.cos(ang)*0.28, 0.79, Math.sin(ang)*0.28);
                group.add(spike);
            }
            const gem = new THREE.Mesh(new THREE.SphereGeometry(0.11, 24), new THREE.MeshStandardMaterial({ color: 0xff66cc, metalness: 0.9 }));
            gem.position.y = 0.9;
            group.add(gem);
            break;
        case 'knight':
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.26,0.38,12), bodyMat);
            neck.position.set(0.15,0.48,0); neck.rotation.z=-0.35;
            group.add(neck);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.24), bodyMat);
            head.position.set(0.36,0.68,0); head.rotation.z=-0.15;
            group.add(head);
            const ear = new THREE.Mesh(new THREE.ConeGeometry(0.09,0.16,6), bodyMat);
            ear.position.set(0.44,0.84,0.1);
            group.add(ear);
            break;
        case 'bishop':
            const mitre = new THREE.Mesh(new THREE.ConeGeometry(0.3,0.48,12), bodyMat);
            mitre.position.y = 0.62;
            group.add(mitre);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.28,0.045,20,48), goldMat);
            ring.rotation.x = Math.PI/2;
            ring.position.y = 0.42;
            group.add(ring);
            break;
        case 'rook':
            const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.36,0.52,8), bodyMat);
            tower.position.y = 0.42;
            group.add(tower);
            for (let i=0;i<4;i++) {
                const ang = (i/4)*Math.PI*2;
                const batt = new THREE.Mesh(new THREE.BoxGeometry(0.14,0.16,0.14), bodyMat);
                batt.position.set(Math.cos(ang)*0.35,0.73,Math.sin(ang)*0.35);
                group.add(batt);
            }
            break;
        case 'pawn':
            const pn = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.28,0.22,16), bodyMat);
            pn.position.y = 0.42;
            group.add(pn);
            const ph = new THREE.Mesh(new THREE.SphereGeometry(0.2,32), bodyMat);
            ph.position.y = 0.65;
            group.add(ph);
            break;
    }
    return group;
}

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050b1a);
    camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(5.8, 7.5, 7.8);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.left = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);
    controls3D = new OrbitControls(camera, renderer.domElement);
    controls3D.enableDamping = true;
    controls3D.target.set(0,0.5,0);
    const ambient = new THREE.AmbientLight(0x404060);
    scene.add(ambient);
    const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.3);
    mainLight.position.set(5,12,6);
    mainLight.castShadow = true;
    scene.add(mainLight);
    const fill = new THREE.PointLight(0xccaa88,0.6);
    fill.position.set(-3,5,4);
    scene.add(fill);
    const boardGroup = new THREE.Group();
    for (let i=0;i<8;i++) for (let j=0;j<8;j++) {
        const col = (i+j)%2===0 ? 0xf0d9b5 : 0xb58863;
        const sq = new THREE.Mesh(new THREE.BoxGeometry(0.96,0.12,0.96), new THREE.MeshStandardMaterial({ color:col, roughness:0.3 }));
        sq.position.set(j-3.5, -0.07, i-3.5);
        sq.receiveShadow = true;
        boardGroup.add(sq);
    }
    scene.add(boardGroup);
    piecesGroup = new THREE.Group();
    scene.add(piecesGroup);
    rebuild3DPieces();
    renderer.domElement.addEventListener('click', onClick3D);
    renderer.domElement.addEventListener('touchstart', onTouch3DStart);
    renderer.domElement.addEventListener('touchend', onTouch3DEnd);
}

function rebuild3DPieces() {
    while(piecesGroup.children.length) piecesGroup.remove(piecesGroup.children[0]);
    piecesMap.clear();
    for (let i=0;i<8;i++) for (let j=0;j<8;j++) {
        const p = board[i][j];
        if (p) {
            const mesh = createPieceMesh(p);
            mesh.userData = { row:i, col:j, piece:p };
            mesh.position.set(j-3.5, 0.09, i-3.5);
            piecesGroup.add(mesh);
            piecesMap.set(`${i},${j}`, mesh);
        }
    }
}
function update3DPiece(piece) {
    const key = `${piece.row},${piece.col}`;
    if (piecesMap.has(key)) { piecesGroup.remove(piecesMap.get(key)); piecesMap.delete(key); }
    const newMesh = createPieceMesh(piece);
    newMesh.userData = { row:piece.row, col:piece.col, piece };
    newMesh.position.set(piece.col-3.5, 0.09, piece.row-3.5);
    piecesGroup.add(newMesh);
    piecesMap.set(key, newMesh);
}
function remove3DPiece(piece) { const key = `${piece.row},${piece.col}`; if(piecesMap.has(key)) { piecesGroup.remove(piecesMap.get(key)); piecesMap.delete(key); } }
function clearHighlights3D() { highlightMeshes.forEach(h => piecesGroup.remove(h)); highlightMeshes = []; }
function highlight3D(row,col,color) {
    const sq = new THREE.Mesh(new THREE.BoxGeometry(0.94,0.06,0.94), new THREE.MeshStandardMaterial({ color, transparent:true, opacity:0.7, emissive:color, emissiveIntensity:0.3 }));
    sq.position.set(col-3.5, -0.02, row-3.5);
    piecesGroup.add(sq);
    highlightMeshes.push(sq);
}
function draw3DHighlights() {
    if (selectedPiece) {
        clearHighlights3D();
        highlight3D(selectedPiece.row, selectedPiece.col, 0xffaa44);
        for (let i=0;i<8;i++) for (let j=0;j<8;j++) if (isValidMove(selectedPiece.piece, i, j, board)) highlight3D(i,j,0x44ff44);
    }
}
let touchCache = null;
function onTouch3DStart(e) { e.preventDefault(); const t=e.touches[0]; touchCache={x:t.clientX, y:t.clientY}; }
function onTouch3DEnd(e) { e.preventDefault(); if(touchCache) { const rect=renderer.domElement.getBoundingClientRect(); handleClick3D(touchCache.x-rect.left, touchCache.y-rect.top); touchCache=null; } }
function onClick3D(e) { const rect=renderer.domElement.getBoundingClientRect(); handleClick3D(e.clientX-rect.left, e.clientY-rect.top); }

async function handleClick3D(x,y) {
    if (gameOver || gameMode === 'auto') return;
    const mouse = new THREE.Vector2((x/renderer.domElement.clientWidth)*2-1, -(y/renderer.domElement.clientHeight)*2+1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    let clicked = null;
    const hits = raycaster.intersectObjects(piecesGroup.children, true);
    for (let hit of hits) {
        let obj = hit.object;
        while (obj.parent !== piecesGroup && obj.parent !== null) obj = obj.parent;
        if (obj.userData?.piece) { clicked = obj; break; }
    }
    let targetCell = null;
    const planeHits = raycaster.intersectObjects(piecesGroup.children, false);
    for (let hit of planeHits) {
        const col = Math.round(hit.point.x + 3.5);
        const row = Math.round(hit.point.z + 3.5);
        if (row>=0 && row<8 && col>=0 && col<8) { targetCell = { row, col }; break; }
    }
    if (selectedPiece) {
        if (targetCell && isValidMove(selectedPiece.piece, targetCell.row, targetCell.col, board)) {
            if (await executeMove(selectedPiece.piece, targetCell.row, targetCell.col)) {
                clearHighlights3D();
                selectedPiece = null;
                switchTurn();
            } else { clearHighlights3D(); selectedPiece = null; }
        } else { clearHighlights3D(); selectedPiece = null; }
    } else if (clicked?.userData.piece) {
        const p = clicked.userData.piece;
        const can = (gameMode==='vsAI' && p.color===playerColor && p.color===turn) || (gameMode==='vs2' && p.color===turn);
        if (can) { selectedPiece = { piece:p, row:p.row, col:p.col }; draw3DHighlights(); }
    }
}

// ---------- MODO 2D ----------
function init2D() {
    canvas2d = document.getElementById('canvas2d');
    canvas2d.width = window.innerWidth;
    canvas2d.height = window.innerHeight;
    ctx2d = canvas2d.getContext('2d');
    canvas2d.style.display = 'block';
    if (renderer) renderer.domElement.style.display = 'none';
    if (labelRenderer) labelRenderer.domElement.style.display = 'none';
    canvas2d.addEventListener('click', onClick2D);
    canvas2d.addEventListener('touchstart', onTouch2DStart);
    canvas2d.addEventListener('touchend', onTouch2DEnd);
    draw2DBoard();
}
function getSquare2D(px, py) {
    const size = Math.min(canvas2d.width, canvas2d.height) * 0.72;
    const offX = (canvas2d.width - size)/2;
    const offY = (canvas2d.height - size)/2;
    const sq = size/8;
    const col = Math.floor((px - offX)/sq);
    const row = Math.floor((py - offY)/sq);
    if (row>=0 && row<8 && col>=0 && col<8) return { row, col };
    return null;
}
function draw2DBoard() {
    if (!ctx2d) return;
    const size = Math.min(canvas2d.width, canvas2d.height) * 0.72;
    const offX = (canvas2d.width - size)/2;
    const offY = (canvas2d.height - size)/2;
    const sq = size/8;
    for (let i=0;i<8;i++) for (let j=0;j<8;j++) {
        ctx2d.fillStyle = (i+j)%2===0 ? '#eed9bb' : '#b58863';
        ctx2d.fillRect(offX+j*sq, offY+i*sq, sq, sq);
        if (selected2D && selected2D.row===i && selected2D.col===j) {
            ctx2d.fillStyle = 'rgba(255,170,68,0.7)';
            ctx2d.fillRect(offX+j*sq, offY+i*sq, sq, sq);
        }
        for (let h of highlight2D) if (h.row===i && h.col===j) {
            ctx2d.fillStyle = 'rgba(68,255,68,0.6)';
            ctx2d.fillRect(offX+j*sq, offY+i*sq, sq, sq);
        }
        const p = board[i][j];
        if (p) {
            let sym = '';
            switch(p.type) {
                case 'king': sym='♔'; break; case 'queen': sym='♕'; break;
                case 'rook': sym='♖'; break; case 'bishop': sym='♗'; break;
                case 'knight': sym='♘'; break; case 'pawn': sym='♙'; break;
            }
            ctx2d.font = `${sq*0.58}px 'Segoe UI'`;
            ctx2d.fillStyle = p.color === 'white' ? '#fff8f0' : '#111';
            ctx2d.fillText(sym, offX+j*sq+sq*0.28, offY+i*sq+sq*0.78);
        }
    }
}
let touch2D = null;
function onTouch2DStart(e) { e.preventDefault(); const t=e.touches[0]; touch2D={x:t.clientX, y:t.clientY}; }
function onTouch2DEnd(e) { e.preventDefault(); if(touch2D) { handleClick2D(touch2D.x, touch2D.y); touch2D=null; } }
function onClick2D(e) { handleClick2D(e.clientX, e.clientY); }
async function handleClick2D(x,y) {
    if (gameOver || gameMode==='auto') return;
    const coord = getSquare2D(x,y);
    if (!coord) { selected2D=null; highlight2D=[]; draw2DBoard(); return; }
    if (selected2D) {
        const piece = board[selected2D.row][selected2D.col];
        if (piece && isValidMove(piece, coord.row, coord.col, board)) {
            if (await executeMove(piece, coord.row, coord.col)) {
                selected2D = null; highlight2D = [];
                switchTurn();
            } else { selected2D = null; highlight2D = []; }
        } else { selected2D = null; highlight2D = []; }
        draw2DBoard();
    } else {
        const piece = board[coord.row][coord.col];
        if (piece) {
            const can = (gameMode==='vsAI' && piece.color===playerColor && piece.color===turn) || (gameMode==='vs2' && piece.color===turn);
            if (can) {
                selected2D = coord;
                highlight2D = [];
                for (let i=0;i<8;i++) for (let j=0;j<8;j++) if (isValidMove(piece, i, j, board)) highlight2D.push({row:i, col:j});
                draw2DBoard();
            }
        }
    }
}

// ---------- UI y control ----------
function updateUI() {
    document.getElementById('turnText').innerHTML = turn === 'white' ? '⚪ BLANCAS' : '⚫ NEGRAS';
    let modeStr = gameMode === 'vsAI' ? '🤖 VS IA' : (gameMode === 'vs2' ? '👥 2 JUGADORES' : '⚡ IA vs IA');
    document.getElementById('modeLabel').innerHTML = modeStr;
}
function resetGame() {
    if (gameMode === 'auto') stopAutoPlay();
    initBoard();
    if (is3D) { rebuild3DPieces(); clearHighlights3D(); selectedPiece = null; }
    else { selected2D = null; highlight2D = []; draw2DBoard(); }
    if (gameMode === 'auto') startAutoPlay();
    else if (gameMode === 'vsAI' && playerColor === 'black' && turn === 'white') setTimeout(() => makeAIMove(), 300);
}
function switchDimension() {
    if (is3D) {
        is3D = false;
        init2D();
        document.getElementById('toggleDimBtn').innerHTML = '🔄 CAMBIAR A 3D';
    } else {
        is3D = true;
        document.getElementById('canvas2d').style.display = 'none';
        if (renderer) renderer.domElement.style.display = 'block';
        if (labelRenderer) labelRenderer.domElement.style.display = 'block';
        rebuild3DPieces();
        draw3DHighlights();
        document.getElementById('toggleDimBtn').innerHTML = '🔄 CAMBIAR A 2D';
    }
}
function startGame(mode, whiteVal, blackVal, dim) {
    gameMode = mode;
    whiteColorCode = whiteVal;
    blackColorCode = blackVal;
    playerColor = 'white';
    is3D = (dim === '3d');
    if (gameMode === 'auto') stopAutoPlay();
    initBoard();
    if (is3D) {
        if (!scene) init3D();
        else { rebuild3DPieces(); if(renderer) renderer.domElement.style.display='block'; if(labelRenderer) labelRenderer.domElement.style.display='block'; document.getElementById('canvas2d').style.display='none'; }
    } else {
        init2D();
    }
    document.getElementById('startModal').style.display = 'none';
    if (gameMode === 'auto') startAutoPlay();
    else if (gameMode === 'vsAI' && turn === 'white' && playerColor === 'black') setTimeout(() => makeAIMove(), 500);
}
function renderColorSelector() {
    const grid = document.getElementById('colorGrid');
    grid.innerHTML = '';
    const colors = isSelectingBlackFor2P ? darkPalette : colorPalette;
    colors.forEach((c, idx) => {
        const sw = document.createElement('div');
        sw.className = 'swatch';
        sw.style.backgroundColor = c.preview;
        sw.onclick = () => {
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            sw.classList.add('selected');
            if (isSelectingBlackFor2P) selectedBlackIdx = idx;
            else selectedWhiteIdx = idx;
            document.getElementById('previewCircle').style.backgroundColor = c.preview;
        };
        grid.appendChild(sw);
    });
    document.getElementById('previewCircle').style.backgroundColor = isSelectingBlackFor2P ? darkPalette[selectedBlackIdx].preview : colorPalette[selectedWhiteIdx].preview;
}
let chosenDimension = '3d';
document.getElementById('dim3d').onclick = () => chosenDimension = '3d';
document.getElementById('dim2d').onclick = () => chosenDimension = '2d';
document.getElementById('modeVsAI').onclick = () => { pendingMode='vsAI'; isSelectingBlackFor2P=false; document.getElementById('colorPrompt').innerHTML='🎨 COLOR TUS PIEZAS BLANCAS:'; renderColorSelector(); };
document.getElementById('mode2P').onclick = () => { pendingMode='vs2'; isSelectingBlackFor2P=false; document.getElementById('colorPrompt').innerHTML='🎨 COLOR BLANCAS:'; renderColorSelector(); };
document.getElementById('modeAIAI').onclick = () => { pendingMode='auto'; document.getElementById('colorPrompt').innerHTML='🌈 IA vs IA (colores aleatorios)'; document.getElementById('colorGrid').innerHTML='<div style="grid-column:1/-1; text-align:center; color:#ffd966;">✨ COLORES ALEATORIOS ✨</div>'; };
document.getElementById('startGameBtn').onclick = () => {
    if (pendingMode === 'auto') {
        const randW = colorPalette[Math.floor(Math.random()*colorPalette.length)].val;
        const randB = darkPalette[Math.floor(Math.random()*darkPalette.length)].val;
        startGame('auto', randW, randB, chosenDimension);
    } else if (pendingMode === 'vs2') {
        if (isSelectingBlackFor2P) startGame('vs2', colorPalette[selectedWhiteIdx].val, darkPalette[selectedBlackIdx].val, chosenDimension);
        else { isSelectingBlackFor2P = true; document.getElementById('colorPrompt').innerHTML='🎨 AHORA COLOR NEGRAS:'; renderColorSelector(); document.getElementById('startGameBtn').innerHTML = '✅ CONFIRMAR COLORES'; }
    } else {
        startGame('vsAI', colorPalette[selectedWhiteIdx].val, darkPalette[0].val, chosenDimension);
    }
};
document.getElementById('resetBtn').onclick = () => resetGame();
document.getElementById('colorBtn').onclick = () => { if(gameMode !== 'auto') document.getElementById('startModal').style.display = 'flex'; };
document.getElementById('toggleDimBtn').onclick = () => switchDimension();
renderColorSelector();
function animateLoop() {
    requestAnimationFrame(animateLoop);
    if (is3D && scene && renderer) { controls3D.update(); renderer.render(scene, camera); if(labelRenderer) labelRenderer.render(scene, camera); }
}
animateLoop();
window.addEventListener('resize', () => {
    if (is3D && camera) {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        if(labelRenderer) labelRenderer.setSize(window.innerWidth, window.innerHeight);
    } else if (!is3D && canvas2d) {
        canvas2d.width = window.innerWidth;
        canvas2d.height = window.innerHeight;
        draw2DBoard();
    }
});
</script>
</body>

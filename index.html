<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AJEREX BETA v1.2 - AlexanderGH PROJECTS 2026 🪐</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.75);
            padding: 6px 12px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
            font-size: 10px;
            font-weight: bold;
        }
        
        #turn-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            color: #ffd700;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.6);
        }
        
        #controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            gap: 10px;
            z-index: 20;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        button {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            touch-action: manipulation;
            min-width: 65px;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #btn-vsai { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; }
        #btn-vs2 { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; }
        #btn-reset { background: linear-gradient(135deg, #f44336, #e53935); color: white; }
        
        #color-selector {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            position: relative;
        }
        
        .color-option {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 20px;
            padding: 8px;
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        
        .color-option button {
            background: #333;
            color: white;
            padding: 6px 12px;
            font-size: 11px;
            min-width: auto;
        }
        
        .color-option button:first-child { background: #eeeeff; color: #333; }
        .color-option button:last-child { background: #222; color: white; }
        
        #status {
            position: absolute;
            bottom: 15px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ddd;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            pointer-events: none;
        }
        
        #touch-instruction {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #ffd700;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            transition: opacity 1s;
        }
        
        .touch-feedback {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,215,0,0.5);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 100;
            animation: ripple 0.4s ease-out forwards;
        }
        
        @keyframes ripple {
            0% { width: 0px; height: 0px; opacity: 0.8; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }
        
        @media (max-width: 600px) {
            button { padding: 6px 12px; font-size: 11px; min-width: 55px; }
            #turn-indicator { font-size: 11px; padding: 6px 12px; top: 8px; right: 8px; }
            #info { font-size: 8px; top: 8px; left: 8px; padding: 4px 10px; }
            #controls { gap: 8px; padding: 6px 10px; bottom: 10px; }
            #status { font-size: 8px; bottom: 10px; right: 8px; }
        }
        
        @media (max-width: 900px) and (orientation: landscape) {
            #controls { bottom: 5px; }
            #turn-indicator { top: 5px; right: 5px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        ♜ AJEREX v1.2 | <span id="mode-label">vs IA</span> | <span id="player-color-label">Juegas Blancas</span>
    </div>
    <div id="turn-indicator">
        Turno: <span id="turn-text">♔ Blancas</span>
    </div>
    <div id="controls">
        <button id="btn-vsai">🤖 vs IA</button>
        <button id="btn-vs2">👥 2 Jug</button>
        <button id="btn-reset">🔄 Reiniciar</button>
        <button id="color-selector">🎨 Elegir Color</button>
        <div id="color-options" style="display:none;" class="color-option">
            <button id="play-white">♔ Blancas</button>
            <button id="play-black">♚ Negras</button>
        </div>
    </div>
    <div id="status">
        📱 <span id="game-status">En juego</span>
    </div>
    <div id="touch-instruction">
        👆 Toca pieza → Toca casilla
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        let boardState = Array(8).fill().map(() => Array(8).fill(null));
        let currentTurn = 'white';
        let gameMode = 'vsAI';
        let playerColor = 'white';
        let gameOver = false;
        let selectedPiece = null;
        
        let scene, camera, renderer, labelRenderer, orbitControls, piecesGroup;
        let piecesMeshes = new Map();
        let highlightMeshes = [];
        
        class Piece {
            constructor(type, color, row, col) {
                this.type = type;
                this.color = color;
                this.row = row;
                this.col = col;
                this.hasMoved = false;
            }
        }
        
        function initBoard() {
            boardState = Array(8).fill().map(() => Array(8).fill(null));
            for (let i = 0; i < 8; i++) {
                boardState[1][i] = new Piece('pawn', 'black', 1, i);
                boardState[6][i] = new Piece('pawn', 'white', 6, i);
            }
            const piecesOrder = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
            for (let i = 0; i < 8; i++) {
                boardState[0][i] = new Piece(piecesOrder[i], 'black', 0, i);
                boardState[7][i] = new Piece(piecesOrder[i], 'white', 7, i);
            }
            currentTurn = 'white';
            gameOver = false;
            selectedPiece = null;
            updateTurnDisplay();
            document.getElementById('game-status').innerText = 'En juego';
            
            setTimeout(() => {
                const instr = document.getElementById('touch-instruction');
                if(instr) instr.style.opacity = '0';
            }, 4000);
            
            if (gameMode === 'vsAI' && playerColor === 'black' && currentTurn === 'white' && !gameOver) {
                setTimeout(() => aiMove(), 300);
            }
        }
        
        function isValidMove(piece, toRow, toCol, board) {
            const fromRow = piece.row, fromCol = piece.col;
            const target = board[toRow][toCol];
            if (target && target.color === piece.color) return false;
            
            const deltaRow = toRow - fromRow;
            const deltaCol = toCol - fromCol;
            const absDeltaRow = Math.abs(deltaRow);
            const absDeltaCol = Math.abs(deltaCol);
            
            switch(piece.type) {
                case 'pawn':
                    const dir = piece.color === 'white' ? -1 : 1;
                    const startRow = piece.color === 'white' ? 6 : 1;
                    if (deltaCol === 0 && !target) {
                        if (deltaRow === dir) return true;
                        if (deltaRow === 2*dir && fromRow === startRow && !board[fromRow+dir][fromCol]) return true;
                    } else if (absDeltaCol === 1 && deltaRow === dir && target) return true;
                    return false;
                case 'knight':
                    return (absDeltaRow === 2 && absDeltaCol === 1) || (absDeltaRow === 1 && absDeltaCol === 2);
                case 'bishop':
                    if (absDeltaRow !== absDeltaCol) return false;
                    let stepRow = deltaRow > 0 ? 1 : -1;
                    let stepCol = deltaCol > 0 ? 1 : -1;
                    let r = fromRow + stepRow, c = fromCol + stepCol;
                    while (r !== toRow || c !== toCol) {
                        if (board[r][c]) return false;
                        r += stepRow; c += stepCol;
                    }
                    return true;
                case 'rook':
                    if (fromRow !== toRow && fromCol !== toCol) return false;
                    if (fromRow === toRow) {
                        let step = deltaCol > 0 ? 1 : -1;
                        for (let c = fromCol + step; c !== toCol; c += step) if (board[toRow][c]) return false;
                    } else {
                        let step = deltaRow > 0 ? 1 : -1;
                        for (let r = fromRow + step; r !== toRow; r += step) if (board[r][toCol]) return false;
                    }
                    return true;
                case 'queen':
                    return (isValidMove(new Piece('rook', piece.color, fromRow, fromCol), toRow, toCol, board) ||
                            isValidMove(new Piece('bishop', piece.color, fromRow, fromCol), toRow, toCol, board));
                case 'king':
                    if (absDeltaRow <= 1 && absDeltaCol <= 1) return true;
                    if (absDeltaCol === 2 && deltaRow === 0 && !piece.hasMoved) {
                        const rookCol = deltaCol === 2 ? 7 : 0;
                        const rook = board[fromRow][rookCol];
                        if (rook && rook.type === 'rook' && !rook.hasMoved) {
                            const between = deltaCol === 2 ? [5,6] : [1,2,3];
                            for (let c of between) if (board[fromRow][c]) return false;
                            return true;
                        }
                    }
                    return false;
                default: return false;
            }
        }
        
        function movePiece(piece, toRow, toCol) {
            const fromRow = piece.row, fromCol = piece.col;
            const target = boardState[toRow][toCol];
            if (!isValidMove(piece, toRow, toCol, boardState)) return false;
            
            boardState[toRow][toCol] = piece;
            boardState[fromRow][fromCol] = null;
            piece.row = toRow;
            piece.col = toCol;
            piece.hasMoved = true;
            
            if (piece.type === 'pawn' && (toRow === 0 || toRow === 7)) {
                piece.type = 'queen';
            }
            
            if (piece.type === 'king' && Math.abs(toCol - fromCol) === 2) {
                const rookFromCol = toCol === 6 ? 7 : 0;
                const rookToCol = toCol === 6 ? 5 : 3;
                const rook = boardState[fromRow][rookFromCol];
                if (rook && rook.type === 'rook') {
                    boardState[fromRow][rookToCol] = rook;
                    boardState[fromRow][rookFromCol] = null;
                    rook.row = fromRow;
                    rook.col = rookToCol;
                    rook.hasMoved = true;
                    update3DPiece(rook);
                }
            }
            
            update3DPiece(piece);
            if (target) remove3DPiece(target);
            return true;
        }
        
        function switchTurn() {
            currentTurn = currentTurn === 'white' ? 'black' : 'white';
            updateTurnDisplay();
            
            let whiteKingExists = false, blackKingExists = false;
            for (let i=0;i<8;i++) for(let j=0;j<8;j++) {
                const p = boardState[i][j];
                if(p && p.type === 'king') {
                    if(p.color === 'white') whiteKingExists = true;
                    else blackKingExists = true;
                }
            }
            if(!whiteKingExists) { gameOver=true; document.getElementById('game-status').innerText = '🏆 Ganan Negras!'; }
            if(!blackKingExists) { gameOver=true; document.getElementById('game-status').innerText = '🏆 Ganan Blancas!'; }
            if(gameOver) return;
            
            if (gameMode === 'vsAI') {
                const isPlayerTurn = (playerColor === currentTurn);
                if (!isPlayerTurn && !gameOver) {
                    setTimeout(() => aiMove(), 150);
                }
            }
        }
        
        function aiMove() {
            if (gameOver) return;
            const aiColor = playerColor === 'white' ? 'black' : 'white';
            if (currentTurn !== aiColor) return;
            
            let moves = [];
            for (let i=0;i<8;i++) {
                for(let j=0;j<8;j++) {
                    const piece = boardState[i][j];
                    if(piece && piece.color === aiColor) {
                        for(let ti=0;ti<8;ti++) {
                            for(let tj=0;tj<8;tj++) {
                                if(isValidMove(piece, ti, tj, boardState)) {
                                    moves.push({piece, toRow: ti, toCol: tj});
                                }
                            }
                        }
                    }
                }
            }
            if (moves.length === 0) {
                gameOver = true;
                document.getElementById('game-status').innerText = '🏆 ' + (aiColor === 'black' ? 'Blancas ganan' : 'Negras ganan');
                return;
            }
            const randomMove = moves[Math.floor(Math.random() * moves.length)];
            if (movePiece(randomMove.piece, randomMove.toRow, randomMove.toCol)) {
                clearHighlights();
                selectedPiece = null;
                switchTurn();
            } else {
                aiMove();
            }
        }
        
        function createPiece3D(piece) {
            const group = new THREE.Group();
            const mainColor = piece.color === 'white' ? 0xeeeeff : 0x222222;
            const goldColor = 0xffcc44;
            
            const baseGeo = new THREE.CylinderGeometry(0.38, 0.42, 0.12, 32);
            const baseMat = new THREE.MeshStandardMaterial({ color: mainColor, metalness: 0.7, roughness: 0.3 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 0.06;
            base.castShadow = true;
            group.add(base);
            
            const bodyGeo = new THREE.CylinderGeometry(0.32, 0.35, 0.28, 32);
            const body = new THREE.Mesh(bodyGeo, baseMat);
            body.position.y = 0.25;
            body.castShadow = true;
            group.add(body);
            
            switch(piece.type) {
                case 'king':
                    const topPart = new THREE.CylinderGeometry(0.28, 0.3, 0.35, 32);
                    const topMesh = new THREE.Mesh(topPart, baseMat);
                    topMesh.position.y = 0.52;
                    group.add(topMesh);
                    const crossH = new THREE.BoxGeometry(0.28, 0.08, 0.08);
                    const crossV = new THREE.BoxGeometry(0.08, 0.28, 0.08);
                    const goldMat = new THREE.MeshStandardMaterial({ color: goldColor, metalness: 0.9 });
                    const barH = new THREE.Mesh(crossH, goldMat);
                    const barV = new THREE.Mesh(crossV, goldMat);
                    barH.position.y = 0.78;
                    barV.position.y = 0.78;
                    group.add(barH);
                    group.add(barV);
                    const topBall = new THREE.SphereGeometry(0.09, 16);
                    const ballMesh = new THREE.Mesh(topBall, goldMat);
                    ballMesh.position.y = 0.92;
                    group.add(ballMesh);
                    break;
                    
                case 'queen':
                    const queenBody = new THREE.CylinderGeometry(0.28, 0.32, 0.42, 32);
                    const queenMesh = new THREE.Mesh(queenBody, baseMat);
                    queenMesh.position.y = 0.52;
                    group.add(queenMesh);
                    for(let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        const spikeGeo = new THREE.ConeGeometry(0.07, 0.2, 6);
                        const spikeMat = new THREE.MeshStandardMaterial({ color: goldColor });
                        const spike = new THREE.Mesh(spikeGeo, spikeMat);
                        spike.position.x = Math.cos(angle) * 0.26;
                        spike.position.z = Math.sin(angle) * 0.26;
                        spike.position.y = 0.78;
                        group.add(spike);
                    }
                    const gem = new THREE.SphereGeometry(0.1, 16);
                    const gemMat = new THREE.MeshStandardMaterial({ color: 0xff44aa, metalness: 0.8 });
                    const gemMesh = new THREE.Mesh(gem, gemMat);
                    gemMesh.position.y = 0.88;
                    group.add(gemMesh);
                    break;
                    
                case 'knight':
                    const neckGeo = new THREE.CylinderGeometry(0.2, 0.26, 0.38, 12);
                    const neck = new THREE.Mesh(neckGeo, baseMat);
                    neck.position.set(0.15, 0.48, 0);
                    neck.rotation.z = -0.35;
                    neck.rotation.x = 0.1;
                    group.add(neck);
                    const headGeo = new THREE.BoxGeometry(0.3, 0.3, 0.24);
                    const head = new THREE.Mesh(headGeo, baseMat);
                    head.position.set(0.35, 0.68, 0);
                    head.rotation.z = -0.15;
                    group.add(head);
                    const earGeo = new THREE.ConeGeometry(0.09, 0.16, 6);
                    const ear = new THREE.Mesh(earGeo, baseMat);
                    ear.position.set(0.42, 0.84, 0.1);
                    group.add(ear);
                    const maneGeo = new THREE.CylinderGeometry(0.13, 0.11, 0.22, 6);
                    const maneMat = new THREE.MeshStandardMaterial({ color: piece.color === 'white' ? 0xccaa77 : 0x444444 });
                    const mane = new THREE.Mesh(maneGeo, maneMat);
                    mane.position.set(0.22, 0.72, -0.14);
                    mane.rotation.x = 0.4;
                    group.add(mane);
                    const eyeGeo = new THREE.SphereGeometry(0.05, 16);
                    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                    const eye = new THREE.Mesh(eyeGeo, eyeMat);
                    eye.position.set(0.46, 0.74, 0.13);
                    group.add(eye);
                    break;
                    
                case 'bishop':
                    const mitreGeo = new THREE.ConeGeometry(0.3, 0.48, 8);
                    const mitre = new THREE.Mesh(mitreGeo, baseMat);
                    mitre.position.y = 0.62;
                    group.add(mitre);
                    const ringGeo = new THREE.TorusGeometry(0.28, 0.04, 16, 48);
                    const ringMat = new THREE.MeshStandardMaterial({ color: goldColor });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2;
                    ring.position.y = 0.42;
                    group.add(ring);
                    const topBallBishop = new THREE.SphereGeometry(0.08, 16);
                    const ballBishop = new THREE.Mesh(topBallBishop, new THREE.MeshStandardMaterial({ color: goldColor }));
                    ballBishop.position.y = 0.88;
                    group.add(ballBishop);
                    break;
                    
                case 'rook':
                    const towerGeo = new THREE.CylinderGeometry(0.32, 0.36, 0.52, 8);
                    const tower = new THREE.Mesh(towerGeo, baseMat);
                    tower.position.y = 0.42;
                    group.add(tower);
                    for(let i = 0; i < 4; i++) {
                        const angle = (i / 4) * Math.PI * 2;
                        const battlementGeo = new THREE.BoxGeometry(0.14, 0.16, 0.14);
                        const battlement = new THREE.Mesh(battlementGeo, new THREE.MeshStandardMaterial({ color: mainColor }));
                        battlement.position.x = Math.cos(angle) * 0.34;
                        battlement.position.z = Math.sin(angle) * 0.34;
                        battlement.position.y = 0.72;
                        group.add(battlement);
                    }
                    break;
                    
                case 'pawn':
                    const pawnNeck = new THREE.CylinderGeometry(0.22, 0.28, 0.22, 16);
                    const pawnNeckMesh = new THREE.Mesh(pawnNeck, baseMat);
                    pawnNeckMesh.position.y = 0.42;
                    group.add(pawnNeckMesh);
                    const pawnHead = new THREE.SphereGeometry(0.19, 32);
                    const pawnHeadMesh = new THREE.Mesh(pawnHead, baseMat);
                    pawnHeadMesh.position.y = 0.64;
                    group.add(pawnHeadMesh);
                    const pawnRing = new THREE.TorusGeometry(0.27, 0.04, 16, 48);
                    const pawnRingMesh = new THREE.Mesh(pawnRing, new THREE.MeshStandardMaterial({ color: goldColor }));
                    pawnRingMesh.rotation.x = Math.PI / 2;
                    pawnRingMesh.position.y = 0.36;
                    group.add(pawnRingMesh);
                    break;
            }
            
            return group;
        }
        
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a2a);
            scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);
            
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(40, aspect, 0.1, 1000);
            camera.position.set(5.5, 7.5, 7.5);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);
            
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.06;
            orbitControls.enableZoom = true;
            orbitControls.zoomSpeed = 0.8;
            orbitControls.rotateSpeed = 0.8;
            orbitControls.touchRotate = true;
            orbitControls.touchZoom = true;
            orbitControls.target.set(0, 0.5, 0);
            
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.0);
            mainLight.position.set(5, 12, 6);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 512;
            mainLight.shadow.mapSize.height = 512;
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0xccaa88, 0.5);
            fillLight.position.set(-3, 5, 4);
            scene.add(fillLight);
            const backLight = new THREE.PointLight(0x88aaff, 0.3);
            backLight.position.set(0, 4, -6);
            scene.add(backLight);
            
            const boardGroup = new THREE.Group();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const color = (i + j) % 2 === 0 ? 0xf0d9b5 : 0xb58863;
                    const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.1 });
                    const geometry = new THREE.BoxGeometry(0.96, 0.1, 0.96);
                    const square = new THREE.Mesh(geometry, material);
                    square.position.x = j - 3.5;
                    square.position.z = i - 3.5;
                    square.position.y = -0.05;
                    square.receiveShadow = true;
                    boardGroup.add(square);
                    
                    const div = document.createElement('div');
                    div.textContent = `${String.fromCharCode(97+j)}${8-i}`;
                    div.style.color = (i+j)%2===0 ? '#553b1f' : '#f0e6d2';
                    div.style.fontSize = '9px';
                    div.style.fontWeight = 'bold';
                    div.style.textShadow = '0 0 2px rgba(0,0,0,0.5)';
                    const label = new CSS2DObject(div);
                    label.position.set(j - 3.5, -0.18, i - 3.5);
                    boardGroup.add(label);
                }
            }
            scene.add(boardGroup);
            
            piecesGroup = new THREE.Group();
            scene.add(piecesGroup);
            
            createAllPieces();
            
            renderer.domElement.addEventListener('click', onClick, false);
            renderer.domElement.addEventListener('touchstart', onTouchStart, false);
            renderer.domElement.addEventListener('touchend', onTouchEnd, false);
        }
        
        let touchTarget = null;
        
        function onTouchStart(event) {
            event.preventDefault();
            const touch = event.touches[0];
            const feedback = document.createElement('div');
            feedback.className = 'touch-feedback';
            feedback.style.left = touch.clientX + 'px';
            feedback.style.top = touch.clientY + 'px';
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 400);
            touchTarget = { x: touch.clientX, y: touch.clientY };
        }
        
        function onTouchEnd(event) {
            event.preventDefault();
            if (touchTarget) {
                const rect = renderer.domElement.getBoundingClientRect();
                const x = touchTarget.x - rect.left;
                const y = touchTarget.y - rect.top;
                if (x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
                    handleInteraction(x, y);
                }
                touchTarget = null;
            }
        }
        
        function onClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            handleInteraction(x, y);
        }
        
        function handleInteraction(x, y) {
            if(gameOver) return;
            
            const rect = renderer.domElement.getBoundingClientRect();
            const mouseX = (x / rect.width) * 2 - 1;
            const mouseY = -(y / rect.height) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(mouseX, mouseY), camera);
            
            const intersects = raycaster.intersectObjects(piecesGroup.children, true);
            let clickedPiece = null;
            
            for(let intersect of intersects) {
                let obj = intersect.object;
                while(obj.parent !== piecesGroup && obj.parent !== null) obj = obj.parent;
                if(obj.userData && obj.userData.piece) {
                    clickedPiece = obj;
                    break;
                }
            }
            
            const planeIntersects = raycaster.intersectObjects(piecesGroup.children, false);
            let targetRowCol = null;
            for(let intersect of planeIntersects) {
                const point = intersect.point;
                const col = Math.round(point.x + 3.5);
                const row = Math.round(point.z + 3.5);
                if(row >= 0 && row < 8 && col >= 0 && col < 8) {
                    targetRowCol = { row, col };
                    break;
                }
            }
            
            if(selectedPiece) {
                if(targetRowCol) {
                    if(movePiece(selectedPiece.piece, targetRowCol.row, targetRowCol.col)) {
                        clearHighlights();
                        selectedPiece = null;
                        switchTurn();
                    } else {
                        clearHighlights();
                        selectedPiece = null;
                    }
                } else {
                    clearHighlights();
                    selectedPiece = null;
                }
            }
            else if(clickedPiece && clickedPiece.userData.piece) {
                const piece = clickedPiece.userData.piece;
                if(gameMode === 'vsAI') {
                    if(piece.color === playerColor && piece.color === currentTurn) {
                        selectedPiece = { piece: piece };
                        clearHighlights();
                        highlightSquare(piece.row, piece.col, 0xffaa44);
                        for(let i = 0; i < 8; i++) {
                            for(let j = 0; j < 8; j++) {
                                if(isValidMove(piece, i, j, boardState)) {
                                    highlightSquare(i, j, 0x44ff44);
                                }
                            }
                        }
                    }
                } else {
                    if(piece.color === currentTurn) {
                        selectedPiece = { piece: piece };
                        clearHighlights();
                        highlightSquare(piece.row, piece.col, 0xffaa44);
                        for(let i = 0; i < 8; i++) {
                            for(let j = 0; j < 8; j++) {
                                if(isValidMove(piece, i, j, boardState)) {
                                    highlightSquare(i, j, 0x44ff44);
                                }
                            }
                        }
                    }
                }
            }
        }
        
        function createAllPieces() {
            while(piecesGroup.children.length) piecesGroup.remove(piecesGroup.children[0]);
            piecesMeshes.clear();
            
            for(let i = 0; i < 8; i++) {
                for(let j = 0; j < 8; j++) {
                    const piece = boardState[i][j];
                    if(piece) {
                        const mesh = createPiece3D(piece);
                        mesh.userData = { row: i, col: j, piece: piece };
                        mesh.position.x = j - 3.5;
                        mesh.position.z = i - 3.5;
                        mesh.position.y = 0.08;
                        piecesGroup.add(mesh);
                        piecesMeshes.set(`${i},${j}`, mesh);
                    }
                }
            }
        }
        
        function update3DPiece(piece) {
            for(let [key, mesh] of piecesMeshes) {
                if(mesh.userData.piece === piece && (mesh.userData.row !== piece.row || mesh.userData.col !== piece.col)) {
                    piecesGroup.remove(mesh);
                    piecesMeshes.delete(key);
                    break;
                }
            }
            if(piecesMeshes.has(`${piece.row},${piece.col}`)) {
                piecesGroup.remove(piecesMeshes.get(`${piece.row},${piece.col}`));
                piecesMeshes.delete(`${piece.row},${piece.col}`);
            }
            const newMesh = createPiece3D(piece);
            newMesh.userData = { row: piece.row, col: piece.col, piece: piece };
            newMesh.position.x = piece.col - 3.5;
            newMesh.position.z = piece.row - 3.5;
            newMesh.position.y = 0.08;
            piecesGroup.add(newMesh);
            piecesMeshes.set(`${piece.row},${piece.col}`, newMesh);
        }
        
        function remove3DPiece(piece) {
            const key = `${piece.row},${piece.col}`;
            if(piecesMeshes.has(key)) {
                piecesGroup.remove(piecesMeshes.get(key));
                piecesMeshes.delete(key);
            }
        }
        
        function clearHighlights() {
            highlightMeshes.forEach(h => piecesGroup.remove(h));
            highlightMeshes = [];
        }
        
        function highlightSquare(row, col, color) {
            const geometry = new THREE.BoxGeometry(0.94, 0.05, 0.94);
            const material = new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.65 });
            const square = new THREE.Mesh(geometry, material);
            square.position.x = col - 3.5;
            square.position.z = row - 3.5;
            square.position.y = -0.02;
            piecesGroup.add(square);
            highlightMeshes.push(square);
        }
        
        function updateTurnDisplay() {
            const turnSymbol = currentTurn === 'white' ? '♔ Blancas' : '♚ Negras';
            document.getElementById('turn-text').innerHTML = turnSymbol;
            document.getElementById('mode-label').innerHTML = gameMode === 'vsAI' ? 'vs IA' : '2 Jugadores';
            const playerText = playerColor === 'white' ? 'Juegas Blancas' : 'Juegas Negras';
            document.getElementById('player-color-label').innerHTML = gameMode === 'vsAI' ? playerText : '';
        }
        
        function resetGame() {
            initBoard();
            createAllPieces();
            clearHighlights();
            selectedPiece = null;
            gameOver = false;
            updateTurnDisplay();
            document.getElementById('game-status').innerText = 'En juego';
            if(gameMode === 'vsAI' && playerColor === 'black' && currentTurn === 'white') {
                setTimeout(() => aiMove(), 200);
            }
        }
        
        function setMode(mode) {
            gameMode = mode;
            resetGame();
        }
        
        function setPlayerColor(color) {
            playerColor = color;
            updateTurnDisplay();
            resetGame();
            document.getElementById('color-options').style.display = 'none';
        }
        
        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        document.getElementById('btn-vsai').addEventListener('click', () => setMode('vsAI'));
        document.getElementById('btn-vs2').addEventListener('click', () => setMode('vs2'));
        document.getElementById('btn-reset').addEventListener('click', () => resetGame());
        
        const colorBtn = document.getElementById('color-selector');
        const colorOptions = document.getElementById('color-options');
        colorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = colorOptions.style.display === 'flex';
            colorOptions.style.display = isVisible ? 'none' : 'flex';
        });
        
        document.getElementById('play-white').addEventListener('click', () => setPlayerColor('white'));
        document.getElementById('play-black').addEventListener('click', () => setPlayerColor('black'));
        
        document.addEventListener('click', (e) => {
            if (!colorBtn.contains(e.target) && !colorOptions.contains(e.target)) {
                colorOptions.style.display = 'none';
            }
        });
        
        initBoard();
        init3D();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
